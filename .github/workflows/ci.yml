name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./build/... ./server/...
      - run: go test -race ./build/... ./server/...

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: make apply
      - run: cd webapp && npm ci
      - run: cd webapp && npm run typecheck
      - run: cd webapp && npm run biome:ci
      - run: cd webapp && npm run react-doctor
      - run: cd webapp && npm run test
      - run: cd webapp && npm run build

  build:
    runs-on: ubuntu-latest
    needs: [server, webapp]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: cd webapp && npm ci
      - run: make dist
      - uses: actions/upload-artifact@v7
        with:
          name: plugin-bundle
          path: dist/*.tar.gz
