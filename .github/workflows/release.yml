name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build and upload assets for
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ always() && ((github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') || github.event_name == 'workflow_dispatch') }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: cd webapp && npm ci
      - run: make dist

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign plugin bundle
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for f in dist/*.tar.gz; do
            gpg --batch --yes \
                --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --personal-digest-preferences SHA256 \
                --detach-sign "$f"
          done

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || needs.release-please.outputs.tag_name }}
        run: gh release upload --clobber "$RELEASE_TAG" dist/*.tar.gz dist/*.tar.gz.sig
