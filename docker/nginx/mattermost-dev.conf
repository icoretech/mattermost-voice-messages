events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8065;

        client_max_body_size 100m;

        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors 'self'; script-src 'self' 'wasm-unsafe-eval' blob:; script-src-elem 'self' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; child-src 'self' blob:" always;
        sub_filter_once off;
        sub_filter "content=\"script-src 'self'\"" "content=\"script-src 'self' 'wasm-unsafe-eval' blob:; script-src-elem 'self' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; child-src 'self' blob:\"";

        location / {
            proxy_pass http://mattermost:8065;
            proxy_http_version 1.1;
            proxy_set_header Accept-Encoding "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
